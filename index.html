<style>
  * { font-family: 'Inter', sans-serif; }
  .font-poppins { font-family: 'Poppins', sans-serif; }
  body {
    background: #0a0a0f;
    color: #e5e7eb;
  }
  .sidebar-overlay { transition: opacity 0.3s ease; }
  .sidebar { transition: transform 0.3s ease; }
  .nav-item { transition: all 0.2s ease; }
  .nav-item:hover { background-color: rgba(99, 102, 241, 0.1); }
  .nav-item.active { 
    background: linear-gradient(90deg, rgba(99, 102, 241, 0.2) 0%, transparent 100%);
    border-right: 3px solid #6366f1;
  }
  .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; }
  .card-hover:hover { 
    transform: translateY(-4px); 
    box-shadow: 0 12px 32px rgba(99, 102, 241, 0.15);
    border-color: rgba(99, 102, 241, 0.4);
  }
  .fade-in { animation: fadeIn 0.4s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .stat-card { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }
  .stat-card-2 { background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%); }
  .stat-card-3 { background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%); }
  .stat-card-4 { background: linear-gradient(135deg, #10b981 0%, #14b8a6 100%); }
  .product-badge { position: absolute; top: 12px; right: 12px; }
  .whatsapp-btn { background: linear-gradient(135deg, #25D366, #128C7E); }
  .section-title { font-family: 'Poppins', sans-serif; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #13151c; }
  ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3d4a; }
  .tab-btn.active { border-bottom: 3px solid #6366f1; color: #a5b4fc; font-weight: 600; }
  .modal-overlay { transition: opacity 0.3s ease; }
  .modal-content { transition: transform 0.3s ease; }
  .glass-card {
    background: rgba(26, 29, 39, 0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }
  .glow-indigo { box-shadow: 0 0 40px rgba(99, 102, 241, 0.15); }
  .gradient-border {
    position: relative;
  }
  .gradient-border::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.5), rgba(139, 92, 246, 0.5));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }
  input, select {
    background: #13151c;
    color: #e5e7eb;
    border-color: #2a2d3a;
  }
  input::placeholder { color: #6b7280; }
  input:focus { border-color: #6366f1; }
  .bg-dark-card { background: #13151c; }
  .bg-dark-card-2 { background: #1a1d27; }
  .border-dark { border-color: #252836; }
  .text-muted { color: #9ca3af; }
  .text-dim { color: #6b7280; }
  .hover-dark:hover { background: #1a1d27; }
</style>
